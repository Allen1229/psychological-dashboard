name: Generate Daily Psychological Ideas

on:
  schedule:
    # 每天 UTC 00:30 執行 (台灣時間 08:30)
    - cron: '42 23 * * *'
  workflow_dispatch: # 允許在網頁上點選 Actions 以手動執行

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 允許 Action 寫入與 Commit 檔案回倉庫

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run generation script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node generate-ideas.js

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add daily-ideas.json
        # 如果檔案有變更才 commit，推回對應倉庫的預設分支
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily ideas JSON [skip ci]" && git push)
