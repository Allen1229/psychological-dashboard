<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理測驗企劃控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(99,102,241,0); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .spin { animation: spin 1s linear infinite; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .slide-up { animation: slide-up 0.4s ease forwards; }
    .progress-bar-inner {
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #6366f1);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    body { zoom: 1.1; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-y-scroll">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const Icon = ({ name, className }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        ref.current.innerHTML = '';
        const el = document.createElement('i');
        el.setAttribute('data-lucide', name);
        if (className) el.className = className;
        ref.current.appendChild(el);
        lucide.createIcons({ root: ref.current });
      }, [name, className]);
      return <span ref={ref} className="inline-flex items-center justify-center" />;
    };

    const RSS_FEEDS = [
      { label: '國內', url: 'https://news.google.com/rss/headlines/section/topic/NATION?hl=zh-TW&gl=TW&ceid=TW:zh-Hant' },
      { label: '娛樂', url: 'https://news.google.com/rss/headlines/section/topic/ENTERTAINMENT?hl=zh-TW&gl=TW&ceid=TW:zh-Hant' },
      { label: '財經', url: 'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=zh-TW&gl=TW&ceid=TW:zh-Hant' },
      { label: '科技', url: 'https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=zh-TW&gl=TW&ceid=TW:zh-Hant' },
      { label: '體育', url: 'https://news.google.com/rss/headlines/section/topic/SPORTS?hl=zh-TW&gl=TW&ceid=TW:zh-Hant' },
    ];

    const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';

    async function fetchTopHeadline(feed) {
      try {
        const res = await fetch(`${PROXY}${encodeURIComponent(feed.url)}`);
        const json = await res.json();
        if (json.items && json.items.length > 0) {
          return json.items.slice(0, 2).map(item => ({ 
            category: feed.label, 
            title: item.title.replace(/\s{2,}/g, ' ').trim(),
            link: item.link
          }));
        }
      } catch (_) {}
      return [];
    }

    const MODELS = [
      { id: 'gemini-2.5-pro', label: 'Gemini 2.5 Pro' },
      { id: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash' },
      { id: 'gemini-2.0-flash', label: 'Gemini 2.0 Flash' },
    ];
    const API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models';

    async function callGemini(apiKey, modelId, prompt) {
      const url = `${API_BASE}/${modelId}:generateContent?key=${apiKey}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            temperature: 0.9,
            maxOutputTokens: 65536,
            responseMimeType: 'application/json'
          }
        })
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || '呼叫 Gemini API 失敗');
      }
      const data = await res.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('Gemini 未回傳任何內容');
      const jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/) || text.match(/(\{[\s\S]*\})/);
      const jsonStr = jsonMatch ? (jsonMatch[1] || jsonMatch[0]) : text;
      return JSON.parse(jsonStr.trim());
    }

    function buildPrompt(headlines) {
      const headlineList = headlines.map((h, i) => `${i + 1}. 【${h.category}】${h.title}\n新聞連結：${h.link}`).join('\n\n');
      return `你是一位趨勢分析與行銷創意總監。請抓取以下 ${headlines.length} 則熱門新聞話題，分析該話題可以延伸成什麼樣的心理測驗，並提供企劃構想，最終輸出 JSON 格式。

### 熱門話題 TOP10：
${headlineList}

---

### 【輸出格式】（純 JSON，不要有任何說明文字或 markdown 標記）
{
  "ideas": [
    {
      "sourceCategory": "類別名稱",
      "sourceTitle": "原始新聞標題",
      "sourceLink": "該新聞的完整連結URL",
      "theme": "心理測驗主題（吸睛、具話題性的好標題）",
      "resultCount": 6, // 建議的結果數量 (範圍在 4~10 之間，最適合這個主題的數字)
      "style": "推薦視覺風格（必須從以下選擇：極簡質感 / 復古像素 / 霓虹賽博 / 奇幻魔法 / 千禧Y2K / 清爽動漫 / 驚悚懸疑 / 溫馨水彩 / 懷舊報刊 / 科幻冷冽 / 唯美浪漫 / 搞怪幽默 / 美式波普 / 底片膠卷 / 國風墨韻 / 廢墟美學 / 立體拼接 / 夢幻蒸汽波 / 自然原始 / 奢華宮廷）",
      "description": "分析說明為何這個話題適合這個測驗主題，以及能給使用者帶來什麼趣味"
    }
  ]
}`;
    }

    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
      const [apiKeyInput, setApiKeyInput] = useState('');
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [model, setModel] = useState(() => localStorage.getItem('gemini_model') || 'gemini-2.5-pro');

      const [quizzes, setQuizzes] = useState(() => {
        try {
          const saved = localStorage.getItem('psychological_quizzes_backup');
          return saved ? JSON.parse(saved) : [];
        } catch { return []; }
      });
      const [expandedId, setExpandedId] = useState(null);
      const [generatedAt, setGeneratedAt] = useState(() => {
        try {
          const saved = localStorage.getItem('psychological_quizzes_time');
          return saved ? new Date(saved) : null;
        } catch { return null; }
      });

      const [status, setStatus] = useState('idle');
      const [statusMsg, setStatusMsg] = useState('');
      const [progress, setProgress] = useState(0);
      const [isFetchingDaily, setIsFetchingDaily] = useState(true);

      const [history, setHistory] = useState(() => {
        try {
          const saved = localStorage.getItem('psychological_quizzes_history_data');
          return saved ? JSON.parse(saved) : [];
        } catch { return []; }
      });
      const [selectedHistoryId, setSelectedHistoryId] = useState(null);

      // On initial local load, if we have history but no selected id, select the first one
      useEffect(() => {
        if (!selectedHistoryId && history.length > 0) {
          setSelectedHistoryId(history[0].id);
          setQuizzes(history[0].ideas);
          setGeneratedAt(new Date(history[0].generatedAt));
        }
      }, [history, selectedHistoryId]);

      useEffect(() => {
        // 嘗試讀取伺服器自動生成的 daily-ideas.json
        fetch('./daily-ideas.json')
          .then(res => {
            if (!res.ok) throw new Error('Not found');
            return res.json();
          })
          .then(data => {
            if (Array.isArray(data) && data.length > 0) {
               // New Array format from history
               const latestServerDate = new Date(data[0].generatedAt).getTime();
               const localDateStr = localStorage.getItem('psychological_quizzes_time');
               const localDate = localDateStr ? new Date(localDateStr).getTime() : 0;
               if (latestServerDate > localDate || history.length === 0) {
                 setHistory(data);
                 setSelectedHistoryId(data[0].id);
                 setQuizzes(data[0].ideas);
                 setGeneratedAt(new Date(data[0].generatedAt));
                 localStorage.setItem('psychological_quizzes_history_data', JSON.stringify(data));
                 localStorage.setItem('psychological_quizzes_backup', JSON.stringify(data[0].ideas));
                 localStorage.setItem('psychological_quizzes_time', data[0].generatedAt);
               }
            } else if (data && data.ideas) {
              const serverDate = new Date(data.generatedAt).getTime();
              const localDateStr = localStorage.getItem('psychological_quizzes_time');
              const localDate = localDateStr ? new Date(localDateStr).getTime() : 0;
              
              const localQuizzesStr = localStorage.getItem('psychological_quizzes_backup');
              const hasNoLocalData = !localQuizzesStr || JSON.parse(localQuizzesStr).length === 0;

              // 如果伺服器的產出時間比本地紀錄還要新，或是本地沒有資料，就覆寫
              if (serverDate > localDate || hasNoLocalData) {
                 setQuizzes(data.ideas);
                 setGeneratedAt(new Date(data.generatedAt));
                 localStorage.setItem('psychological_quizzes_backup', JSON.stringify(data.ideas));
                 localStorage.setItem('psychological_quizzes_time', data.generatedAt);
              }
            }
          })
          .catch(() => {
            // 本地尚無此檔案，略過不處理（使用者可自己手動生成）
          })
          .finally(() => {
            setIsFetchingDaily(false);
          });
      }, []);

      const saveKey = () => {
        const k = apiKeyInput.trim();
        if (!k) return;
        localStorage.setItem('gemini_api_key', k);
        setApiKey(k);
        setShowKeyModal(false);
        setApiKeyInput('');
      };

      const clearKey = () => {
        localStorage.removeItem('gemini_api_key');
        setApiKey('');
        setQuizzes([]);
        setStatus('idle');
      };

      const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text).then(() => alert('已複製！'));
      };

      const generate = useCallback(async () => {
        if (!apiKey) { setShowKeyModal(true); return; }
        setStatus('fetching');
        setProgress(10);
        setStatusMsg('正在抓取 Google 最新頭條...');
        setQuizzes([]);

        try {
          const results = await Promise.all(RSS_FEEDS.map(fetchTopHeadline));
          const headlines = results.flat().filter(Boolean);
          if (headlines.length === 0) throw new Error('無法抓取新聞，請稍後再試');

          setProgress(35);
          setStatus('generating');
          setStatusMsg(`已抓到 ${headlines.length} 則熱門話題，正在請 Gemini 生成心理測驗企劃...`);

          const prompt = buildPrompt(headlines);
          const json = await callGemini(apiKey, model, prompt);

          if (!json.ideas || json.ideas.length === 0) throw new Error('Gemini 未生成任何點子');

          const ideasWithPrompt = json.ideas.map((idea, idx) => ({
            ...idea,
            id: `idea-${idx + 1}`,
            aiPrompt: `請幫我製作一個心理測驗小遊戲，並提供 @[.agent/skills/psychological-test.md] 執行前確認的必要資訊如下：

1. 主題：【${idea.theme}】
2. 結果數量：${idea.resultCount}，並請自行根據主題設定 ${idea.resultCount} 種細微不同的人格分析結果。
3. 風格：【${idea.style}】
4. 廣告預設開啟

請以最高標準嚴格遵循 @[.agent/skills/psychological-test.md] 的【絕對守則】與【程式碼生成藍圖】，切勿遺漏與捏造任何公版細節（包含跨屏 max-width 置中、嚴格一屏高度佈局、純文字貼齊分享列、以及重測廣告蓋板邏輯等），並立即開始設計與撰寫全套程式碼。`
          }));

          setProgress(100);
          setQuizzes(ideasWithPrompt);
          const now = new Date();
          const newId = now.toISOString().split('T')[0];
          setGeneratedAt(now);
          setSelectedHistoryId(newId);

          const newHistoryEntry = {
            id: newId,
            generatedAt: now.toISOString(),
            ideas: ideasWithPrompt
          };
          const existingIndex = history.findIndex(h => h.id === newId);
          let newHistory = [...history];
          if (existingIndex >= 0) newHistory[existingIndex] = newHistoryEntry;
          else newHistory.unshift(newHistoryEntry);
          newHistory = newHistory.slice(0, 8); // Changed to 8
          
          setHistory(newHistory);
          localStorage.setItem('psychological_quizzes_history_data', JSON.stringify(newHistory));
          localStorage.setItem('psychological_quizzes_backup', JSON.stringify(ideasWithPrompt));
          localStorage.setItem('psychological_quizzes_time', now.toISOString());
          setStatus('done');
          setStatusMsg('');

        } catch (err) {
          setStatus('error');
          setStatusMsg(err.message || '發生未知錯誤');
          setProgress(0);
        }
      }, [apiKey, model]);

      const maskedKey = apiKey ? `${apiKey.slice(0, 8)}...${apiKey.slice(-4)}` : '';

      return (
        <div className="min-h-screen">

          {/* Header */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
              <div className="flex items-center gap-2 shrink-0">
                <Icon name="brain-circuit" className="w-6 h-6 text-indigo-600" />
                <h1 className="text-xl font-bold tracking-tight text-slate-900">心理測驗企劃控制台</h1>
              </div>
              <div className="flex items-center gap-2">
                <span className="hidden md:flex items-center gap-1.5 text-xs text-slate-500 mr-2 bg-slate-100 px-2.5 py-1.5 rounded-md font-medium border border-slate-200" title="系統每早排程自動抓取重點話題">
                  <Icon name="alarm-clock" className="w-3.5 h-3.5 text-slate-400" />
                  每日 14:00 自動更新
                </span>
                {apiKey ? (
                  <div className="flex items-center gap-2">
                    <span className="hidden sm:flex items-center gap-1.5 text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 px-3 py-1.5 rounded-full font-medium">
                      <Icon name="key-round" className="w-3.5 h-3.5" />
                      {maskedKey}
                    </span>
                    <button onClick={() => setShowKeyModal(true)} className="text-xs text-slate-500 hover:text-slate-700 px-2 py-1.5 rounded-md hover:bg-slate-100 transition-colors">
                      更換
                    </button>
                  </div>
                ) : (
                  <button onClick={() => setShowKeyModal(true)} className="flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 bg-amber-50 text-amber-700 border border-amber-200 rounded-full hover:bg-amber-100 transition-colors">
                    <Icon name="key-round" className="w-3.5 h-3.5" />
                    設定 API Key
                  </button>
                )}
                <select
                  value={model}
                  onChange={e => { setModel(e.target.value); localStorage.setItem('gemini_model', e.target.value); }}
                  className="text-xs border border-slate-200 rounded-lg px-2 py-1.5 bg-white text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer"
                >
                  {MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
                </select>
                <button
                  onClick={generate}
                  disabled={status === 'fetching' || status === 'generating'}
                  className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 disabled:cursor-not-allowed text-white text-sm font-semibold rounded-lg shadow-sm transition-colors pulse-glow"
                >
                  {status === 'fetching' || status === 'generating'
                    ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full spin inline-block"></span> 生成中...</>
                    : <><Icon name="zap" className="w-4 h-4" /> 覆寫並手動生成</>
                  }
                </button>
              </div>
            </div>
          </header>

          {/* API Key Modal */}
          {showKeyModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 slide-up">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center">
                    <Icon name="key-round" className="w-5 h-5 text-indigo-600" />
                  </div>
                  <div>
                    <h2 className="font-bold text-slate-900 text-lg">設定 Gemini API Key</h2>
                    <p className="text-xs text-slate-500">金鑰只會存在您的瀏覽器中，不會上傳至任何伺服器</p>
                  </div>
                </div>
                <input
                  type="password"
                  placeholder="AIzaSy..."
                  value={apiKeyInput}
                  onChange={e => setApiKeyInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && saveKey()}
                  className="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-3"
                />
                <p className="text-xs text-slate-400 mb-4">
                  前往 <a href="https://aistudio.google.com/apikey" target="_blank" className="text-indigo-500 underline hover:text-indigo-700">aistudio.google.com/apikey</a> 免費取得
                </p>
                <div className="flex gap-2">
                  <button onClick={() => { setShowKeyModal(false); setApiKeyInput(''); }} className="flex-1 px-4 py-2 text-sm text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">取消</button>
                  {apiKey && <button onClick={clearKey} className="px-4 py-2 text-sm text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition-colors">清除</button>}
                  <button onClick={saveKey} disabled={!apiKeyInput.trim()} className="flex-1 px-4 py-2 text-sm font-semibold bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition-colors">儲存並套用</button>
                </div>
              </div>
            </div>
          )}

          {/* Main */}
          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

            <div className="mb-8 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-2">
              <div>
                <h2 className="text-2xl font-bold text-slate-900">最新熱門話題測驗企劃</h2>
                <p className="text-slate-500 mt-1 text-sm">由 Gemini AI 自動讀取 Google 最新頭條，依照心理測驗公版規範即時生成</p>
              </div>
              {generatedAt && (
                <div className="flex items-center gap-3 shrink-0 mt-4 sm:mt-0">
                  <span className="text-xs text-slate-500 font-medium flex items-center gap-1.5 bg-slate-100 px-3 py-1.5 rounded-md border border-slate-200">
                    <Icon name="clock" className="w-4 h-4 text-slate-400" />
                    上次生成：{generatedAt.toLocaleString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}
                  </span>
                  <button 
                    onClick={() => {
                      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(quizzes, null, 2));
                      const dlAnchorElem = document.createElement('a');
                      dlAnchorElem.setAttribute("href", dataStr);
                      // 下載檔名自動帶上當前日期
                      dlAnchorElem.setAttribute("download", `話題測驗備份_${generatedAt.toISOString().slice(0,10)}.json`);
                      dlAnchorElem.click();
                    }}
                    className="text-xs flex items-center gap-1.5 px-3 py-1.5 bg-white border border-indigo-200 text-indigo-600 hover:bg-indigo-50 rounded-md font-medium transition-colors shadow-sm"
                  >
                    <Icon name="download" className="w-4 h-4" />
                    備份為 JSON
                  </button>
                </div>
              )}
            </div>

            {/* History Selector */}
            {history.length > 0 && status !== 'fetching' && status !== 'generating' && (
              <div className="mb-6 flex items-center gap-2 overflow-x-auto pb-2 scrollbar-hide" style={{ scrollbarWidth: 'none' }}>
                <span className="text-sm font-bold text-slate-400 shrink-0 mr-1 flex items-center gap-1">
                  <Icon name="history" className="w-4 h-4" /> 歷史話題
                  <span className="text-xs font-normal opacity-80">(保留近 8 天)</span>
                </span>
                {history.map(item => {
                  const isCur = selectedHistoryId === item.id;
                  return (
                    <button
                      key={item.id}
                      onClick={() => {
                        setSelectedHistoryId(item.id);
                        setQuizzes(item.ideas);
                        setGeneratedAt(new Date(item.generatedAt));
                      }}
                      className={`shrink-0 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors ${
                        isCur
                          ? 'bg-indigo-600 text-white shadow-sm'
                          : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50'
                      }`}
                    >
                      {item.id.replace(/-/g, '/')}
                    </button>
                  );
                })}
              </div>
            )}

            {/* Loading */}
            {(status === 'fetching' || status === 'generating') && (
              <div className="bg-white border border-indigo-100 rounded-2xl p-8 text-center shadow-sm mb-6">
                <div className="w-16 h-16 mx-auto mb-4 bg-indigo-50 rounded-full flex items-center justify-center">
                  <span className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full spin inline-block"></span>
                </div>
                <p className="font-semibold text-slate-700 mb-2">{statusMsg}</p>
                <div className="w-full max-w-xs mx-auto bg-slate-100 rounded-full h-2 overflow-hidden">
                  <div className="progress-bar-inner h-2 rounded-full transition-all duration-500" style={{ width: `${progress}%` }} />
                </div>
              </div>
            )}

            {/* Error */}
            {status === 'error' && (
              <div className="bg-red-50 border border-red-200 rounded-2xl p-6 mb-6 flex items-start gap-3">
                <Icon name="circle-alert" className="w-5 h-5 text-red-500 mt-0.5 shrink-0" />
                <div>
                  <p className="font-semibold text-red-800">生成失敗</p>
                  <p className="text-sm text-red-600 mt-0.5">{statusMsg}</p>
                  <button onClick={generate} className="mt-3 text-xs font-semibold text-red-700 border border-red-300 px-3 py-1 rounded-lg hover:bg-red-100 transition-colors">重試</button>
                </div>
              </div>
            )}

            {/* Initial Fetching */}
            {status === 'idle' && quizzes.length === 0 && isFetchingDaily && (
              <div className="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-12 text-center flex flex-col items-center justify-center min-h-[300px]">
                <span className="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full spin mb-4"></span>
                <p className="text-slate-500 font-medium">正在自動載入今日最新企劃...</p>
              </div>
            )}

            {/* Empty state */}
            {status === 'idle' && quizzes.length === 0 && !isFetchingDaily && (
              <div className="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-12 text-center">
                <div className="w-20 h-20 mx-auto mb-5 bg-indigo-50 rounded-2xl flex items-center justify-center">
                  <Icon name="sparkles" className="w-10 h-10 text-indigo-400" />
                </div>
                <h3 className="font-bold text-slate-700 text-lg mb-2">專屬企劃產生器</h3>
                <p className="text-slate-500 text-sm mb-6 max-w-sm mx-auto">
                  通常系統會在每日下午 14:00 自動產生最新的測驗企劃。<br/><br/>
                  若您為管理員且想立刻手動生成，請點擊右上方按鈕或是下方設定 API Key。
                </p>
                {!apiKey && (
                  <button onClick={() => setShowKeyModal(true)} className="inline-flex items-center gap-2 px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl transition-colors shadow-sm">
                    <Icon name="key-round" className="w-4 h-4" />
                    手動生成 (需設定 API Key)
                  </button>
                )}
                {apiKey && (
                  <button onClick={generate} className="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-colors shadow-sm">
                    <Icon name="zap" className="w-4 h-4" />
                    立刻手動生成話題測驗
                  </button>
                )}
              </div>
            )}

            {/* Idea cards */}
            {quizzes.length > 0 && (
              <div className="space-y-4">
                {quizzes.map((idea, cardIdx) => (
                  <div key={idea.id} className="rounded-xl shadow-sm border border-slate-200 overflow-hidden slide-up even:bg-slate-50 odd:bg-white" style={{ animationDelay: `${cardIdx * 60}ms` }}>
                    <div className="p-4 sm:p-6 flex flex-col md:flex-row md:items-start justify-between gap-4">
                      <div className="flex-1 space-y-3">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded bg-rose-50 text-rose-600 text-xs font-bold border border-rose-100">
                            <Icon name="trending-up" className="w-3.5 h-3.5" />
                            {idea.sourceCategory}
                          </span>
                          {idea.sourceLink ? (
                            <a href={idea.sourceLink} target="_blank" rel="noopener noreferrer" className="text-sm font-medium text-slate-600 bg-slate-100 px-2.5 py-1 rounded border border-slate-200 line-clamp-1 hover:text-indigo-600 hover:bg-indigo-50 transition-colors flex items-center gap-1 group" title={`在外開開啟新聞：${idea.sourceTitle}`}>
                              {idea.sourceTitle}
                              <Icon name="external-link" className="w-3 h-3 opacity-50 group-hover:opacity-100" />
                            </a>
                          ) : (
                            <span className="text-sm font-medium text-slate-600 bg-slate-100 px-2.5 py-1 rounded border border-slate-200 line-clamp-1" title={idea.sourceTitle}>
                              {idea.sourceTitle}
                            </span>
                          )}
                        </div>
                        <div>
                          <h3 className="text-lg sm:text-xl font-bold text-slate-900">{idea.theme}</h3>
                          <p className="text-slate-500 text-sm mt-1 mb-4 leading-relaxed">{idea.description}</p>
                          <div className="flex flex-wrap gap-3">
                            <span className="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-md border border-indigo-100">
                              <Icon name="palette" className="w-3.5 h-3.5" />
                              推薦風格：{idea.style}
                            </span>
                            <span className="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 bg-amber-50 text-amber-700 rounded-md border border-amber-100">
                              <Icon name="award" className="w-3.5 h-3.5" />
                              建議結果數：{idea.resultCount}
                            </span>
                          </div>
                        </div>
                      </div>

                      <div className="flex flex-col items-end gap-3 shrink-0 md:w-64">
                        <button
                          onClick={() => copyToClipboard(idea.aiPrompt)}
                          className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm px-4 py-2.5 rounded-lg shadow-sm transition-colors flex items-center justify-center gap-1.5"
                        >
                          <Icon name="copy" className="w-4 h-4" />
                          立刻複製企劃意圖
                        </button>
                        <p className="text-xs text-slate-400 text-right leading-relaxed">
                          將四種必填參數貼給我，立刻為您展開公版測驗的企劃與全套程式撰寫。
                        </p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
